meta:
  name: 收息型分析
  version: '2.0'
screening:
  exclude:
  - field: name
    contains:
    - ST
    - 退
  industry_cap: 3
  agent_batch:
    ratio: 0.2
    max: 15
  filters:
  - field: pe_ttm
    min: 0.01
    max: 12.0
  - field: pb
    min: 0.01
  - field: total_mv
    min: 1000000.0
  - field: dv
    min: 4.0
  scoring:
    factors:
    - field: dv
      weight: 0.5
      lower_better: false
      full: 8.0
      zero: 4.0
    - field: pe_ttm
      weight: 0.25
      lower_better: true
      full: 5.0
      zero: 12.0
    - field: pb
      weight: 0.25
      lower_better: true
      full: 0.5
      zero: 1.2
    tiers:
    - name: 高安全收息
      conditions:
      - field: dv
        min: 7.0
      - field: pe_ttm
        max: 8.0
      - field: pb
        max: 0.8
    - name: 稳健收息
      conditions:
      - field: dv
        min: 5.5
      - field: pe_ttm
        max: 10.0
    - name: 基础收息
      conditions:
      - field: dv
        min: 4.0
      - field: pe_ttm
        max: 12.0
    default_tier: 未达标
framework:
  operators_dir: operators/v2
  analyst_role: 专注高股息收息策略的投资分析师，核心职责是判断股息是否可持续
  chapters:
  - id: ch01_screening
    chapter: 1
    title: 数据核查与收息资格
    operators:
    - data_source_grading
    - quick_screen_5min
    - soe_identification
    dependencies: []
  - id: ch02_cashflow
    chapter: 2
    title: 盈利质量与现金流分析
    operators:
    - cash_trend_5y
    - owner_earnings
    - performance_restoration
    - debt_structure
    dependencies:
    - ch01_screening
  - id: ch03_dividend
    chapter: 3
    title: 股息可持续性深度分析
    operators:
    - valuation_dividend
    - stress_test
    dependencies:
    - ch02_cashflow
  - id: ch04_risk
    chapter: 4
    title: 前瞻风险与政策影响
    operators:
    - policy_risk
    - industry_position
    - news_signal
    dependencies:
    - ch01_screening
    - ch02_cashflow
  - id: ch05_decision
    chapter: 5
    title: 估值与收息决策
    operators:
    - safety_margin
    - apple_trading_model
    - position_management
    dependencies:
    - ch02_cashflow
    - ch03_dividend
    - ch04_risk
  synthesis:
    thinking_steps:
    - step: 股息安全一票否决
      instruction: '以下任一条件触发则直接回避（评分 ≤ 25）：

        - 经营现金流连续 2 年为负（无法支撑分红）

        - 派息率 > 100%（分红超过利润，不可持续）

        - 近 3 年分红中断过（除非有合理解释如重大收购）

        - 管理层诚信"不可信"

        - 审计意见非标

        - 有息负债率 > 70% 且利息覆盖倍数 < 1.5x

        '
    - step: 股息可持续性评估
      instruction: '核心问题：这个股息能持续吗？逐项检查：

        1. 经营现金流覆盖倍数（覆盖率 > 1.5x 为安全，> 2x 为优秀）

        2. 派息率合理性（< 60% 优秀，60-70% 合理，> 70% 需警惕）

        3. 分红历史稳定性（连续 5 年稳定或增长为最佳信号）

        4. 压力测试：收入下滑场景下能否维持分红？

        5. 国企 vs 民企：国企分红政策更稳定（政策驱动），但需关注"让利"风险

        6. 前瞻风险：Ch04 的政策/行业判断是否威胁分红基础？

        '
    - step: 一致性裁决
      instruction: '检查内部矛盾：

        1. 现金流判定"恶化" vs 股息"可持续"→ 矛盾

        2. 压力测试失败 vs 建仓建议 → 矛盾

        3. 政策风险"高" vs 股息"安全" → 需解释

        存在未调和矛盾时，评分上限 65，不得进入买入区间。

        '
    - step: 收息收益估算与评分
      instruction: '基于可持续性判断，估算总回报：

        - 预期年化股息收益率 = 当前股息率 × 可持续性折扣

        - 估值修复潜力（如有）

        - 总预期年化回报 = 股息率 + 估值修复率

        参照评分锚点给出综合评分。

        收息策略宁可错过高息陷阱，不可买入不可持续的高息股。

        '
    scoring_rubric:
    - range: 85-100
      description: 股息率 > 5% + 覆盖率 > 2x + 连续 5 年稳定/增长 + 安全边际 > 30% + 政策风险低
    - range: 75-84
      description: 股息率 > 4% + 覆盖率 > 1.5x + 基本面健康 + 前瞻风险可控 → 可建仓收息
    - range: 50-74
      description: 股息看似诱人但可持续性存疑（覆盖率不足/政策风险/分红历史不稳）→ 观望
    - range: 30-49
      description: 股息不可持续或前瞻风险较高 → 回避
    - range: 0-29
      description: 高息陷阱或一票否决 → 明确回避
    decision_thresholds:
      buy: 75
      avoid: 29
      watch:
      - 30
      - 74
  synthesis_fields:
  - '股息可持续性: 强 / 中 / 弱 / 不可持续'
  - '当前股息率: 百分比'
  - '预期年化收息回报: 百分比'
  - '现金流覆盖倍数: 经营现金流 / 分红支出'
  - '派息率: 百分比'
  - '连续分红年数: 年'
  - '一致性检查: 通过 / 存在矛盾（列出）'
  - '前瞻风险评估: 政策/行业对分红的影响'
  - '一句话买入逻辑（强制）: 可证伪的投资命题'
  - '关键风险: Top 3 风险点'
  - '最终建议: 建仓收息 / 观望 / 回避'
  - '综合评分: 0-100分'
  - '信心水平: 高 / 中 / 低'
llm:
  base_url_env: LLM_BASE_URL
  api_key_env: LLM_API_KEY
  base_url: https://api.deepseek.com
  model: deepseek-chat
  max_tokens: 8192
  temperature: 0.1
