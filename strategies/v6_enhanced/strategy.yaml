# ============================================================
# V6 增强版：完整分析 + 前瞻风险 + 一致性裁决
# ============================================================
# 在 V6 价值投资框架基础上：
#   - 使用 v2 优化算子库（26 个算子）
#   - 新增前瞻风险评估（政策/AI/行业/市场/新闻）
#   - 新增一致性裁决步骤（防止章节间矛盾）
#   - 买入阈值上调至 75（回测验证最优）
#   - 新增 GARP 流派
#   - 排雷优先于选股
#
# 适合：实时个股深度分析（live-analyze）
# 命令：
#   python -m src.engine.launcher strategies/v6_enhanced/strategy.yaml agent-analyze 601288.SH 2024-06-30

meta:
  name: V6 增强分析
  version: "6.2"

# ============================================================
# 量化筛选配置（与 v6_value 一致）
# ============================================================
screening:
  exclude:
  - field: name
    contains: [ST, 退]

  industry_cap: 3
  agent_batch:
    ratio: 0.2
    max: 20

  filters:
  - field: pe_ttm
    min: 0.01
    max: 15.0
  - field: pb
    min: 0.01
  - field: total_mv
    min: 1000000.0
  - field: dv
    min: 0.01

  scoring:
    factors:
    - field: pe_ttm
      weight: 0.3
      lower_better: true
      full: 6.0
      zero: 15.0
    - field: pb
      weight: 0.3
      lower_better: true
      full: 0.5
      zero: 1.5
    - field: dv
      weight: 0.4
      lower_better: false
      full: 8.0
      zero: 2.0

    tiers:
    - name: S级                            # 极度低估 + 高息
      conditions:
      - {field: pe_ttm, max: 8.0}
      - {field: pb, max: 0.8}
      - {field: dv, min: 7.0}
    - name: A级                            # 明确低估 + 中高息
      conditions:
      - {field: pe_ttm, max: 10.0}
      - {field: pb, max: 1.0}
      - {field: dv, min: 5.0}
    - name: B级                            # 偏低估 + 有息
      conditions:
      - {field: pe_ttm, max: 12.0}
      - {field: pb, max: 1.2}
      - {field: dv, min: 4.0}
    default_tier: 未达标

# ============================================================
# Agent 分析框架（8 章 + 一致性裁决）
# ============================================================
framework:
  operators_dir: operators/v2
  analyst_role: 严谨的投资分析师，排雷优先于选股

  chapters:
  # ---- 第一章: 数据可信度 ----
  - id: ch01_screening
    chapter: 1
    title: 数据核查与快速筛选
    operators: [data_source_grading, geopolitical_exclusion, quick_screen_5min]
    dependencies: []

  # ---- 第二章: 公司画像 ----
  - id: ch02_fundamental
    chapter: 2
    title: 基本面分析
    operators: [soe_identification, stream_classification, debt_structure, cycle_analysis, management_integrity]
    dependencies: [ch01_screening]

  # ---- 第三章: 盈利质量 ----
  - id: ch03_cashflow
    chapter: 3
    title: 现金流与盈利质量
    operators: [cash_trend_5y, performance_restoration, owner_earnings]
    dependencies: [ch01_screening, ch02_fundamental]

  # ---- 第四章: 估值判断 ----
  - id: ch04_valuation
    chapter: 4
    title: 估值与安全边际
    operators: [pe_trap_detection, valuation_fcf, valuation_dividend, safety_margin]
    dependencies: [ch02_fundamental, ch03_cashflow]

  # ---- 第五章: 压力测试与特殊模型 ----
  - id: ch05_stress
    chapter: 5
    title: 压力测试与特殊分析
    operators: [stress_test, cigar_butt, light_asset_model]
    dependencies: [ch03_cashflow, ch04_valuation]

  # ---- 第六章: 前瞻风险（v2 核心新增）----
  - id: ch06_forward_risk
    chapter: 6
    title: 前瞻风险评估
    operators: [policy_risk, ai_disruption, industry_position]
    dependencies: [ch02_fundamental, ch04_valuation]

  # ---- 第七章: 市场环境 ----
  - id: ch07_market
    chapter: 7
    title: 市场环境与资金面
    operators: [market_sentiment, news_signal]
    dependencies: [ch01_screening]

  # ---- 第八章: 投资决策 ----
  - id: ch08_decision
    chapter: 8
    title: 投资决策与持仓管理
    operators: [apple_trading_model, valuation_repair, position_management]
    dependencies: [ch04_valuation, ch05_stress, ch06_forward_risk, ch07_market]

  # ---- 综合研判（6 步，含一致性裁决）----
  synthesis:
    # 6 步结构化思考
    thinking_steps:
      - step: 一票否决
        instruction: |
          检查是否触发以下任一条件（触发则直接回避，评分 ≤ 25）：
          - 数据不可信（Ch01 未通过初筛，数据源评级为 D/E）
          - 管理层诚信评估为"不可信"（财务造假嫌疑、频繁违规）
          - 有息负债结构为"危险"且经营现金流无法覆盖利息
          - 审计意见非标准无保留
          - 前瞻风险中发现致命问题（如 AI 冲击高危且无转型能力，或政策风险为"潜在打击对象"）
          如果触发否决，简要说明原因后直接给出回避建议，无需后续步骤。

      - step: 识别投资机会类型
        instruction: |
          基于 Ch02 流派判定和 Ch06 前瞻风险，确认投资机会类型和评估侧重：
          - 纯硬收息：核心看股息可持续性（派息率 < 70%、现金流覆盖）、分红历史稳定性
          - 价值发现：核心看安全边际、估值修复催化剂——回测显示该流派12m胜率仅47%，需格外审慎评估催化剂确定性
          - 质量成长(GARP)：核心看ROE稳定性、成长持续性、估值合理性（PE 15-30x）
          - 烟蒂股：核心看清算价值（净流动资产 vs 市值）、资产变现可能性
          - 关联方资源：核心看政策依赖度、可持续性——仓位上限建议8%
          同时考虑 Ch06 行业发展趋势——衰退期行业的低估值可能是陷阱。

      - step: 一致性裁决
        instruction: |
          检查各章结论是否存在内部矛盾（此步骤对避免错误评分至关重要）：
          1. Ch01 初筛 vs Ch08 最终建议：若初筛为"观察/不通过"，最终不得直接买入，除非后续章节提供明确推翻理由
          2. 估值链一致性：买入价 < 正常价 < 卖出价？EV/FCF倍数方向与目标价方向一致？
          3. 现金流 vs 估值：Ch03 判定现金流质量差，Ch04 不应给出激进的FCF估值
          4. 压力测试 vs 建议：Ch05 压力测试 0/3 通过，不应给出买入建议
          5. 前瞻风险 vs 估值：Ch06 判定政策/AI风险为"高"，估值修复假设需打折
          若发现核心矛盾且无法调和，评分上限为 65（观望），禁止进入买入区间。

      - step: 核心矛盾
        instruction: |
          综合基本面分析（Ch02-Ch05）和前瞻风险（Ch06-Ch07），回答三个关键问题：
          1. 最可能让我亏钱的原因是什么？（综合压力测试 + 前瞻风险）
          2. 如果买入，我赚的是什么钱？（估值修复 / 股息收入 / 业绩成长）
          3. 市场环境是否支持当前买入？（Ch07 市场情绪 + 资金面）
          如果问题 1 的答案比问题 2 更有说服力，倾向回避。
          排雷优先：回测证明回避信号的alpha贡献（-14.8pp）大于买入信号（+6.4pp）。宁可错过，不可错买。

      - step: 评分与决策
        instruction: |
          基于以上分析，参照评分锚点给出综合评分，并确保评分与最终建议一致。
          信号分层权重（做最终判断时严格遵守）：
          - 核心信号（最高权重）：基本面质量（Ch2）、现金流（Ch3）、估值（Ch4）—— 这些决定"买不买"
          - 修正信号（调节权重）：市场情绪（Ch7）、前瞻风险（Ch6）—— 这些调节"仓位和时机"，不单独决定买卖
          - 参考信号（最低权重）：筛选规则（Ch1）—— 仅作风险提示，不构成否决（除非触发一票否决条件）

          评分时特别注意：
          - 不要被单一亮点拉高分数，也不要被单一瑕疵拉低——综合权衡
          - "价值发现"流派须有明确催化剂才可进入买入区间
          - 前瞻风险为"高"时，评分上限建议不超过 70

      - step: 输出结论
        instruction: 输出结构化 JSON，确保所有必填字段完整。

    # 评分锚点（与 scoring.md v3.0 对齐）
    scoring_rubric:
      - range: "85-100"
        description: "极度低估 + 现金流强劲 + 管理层可信 + 前瞻风险低 + 市场环境配合 + 明确催化剂"
      - range: "75-84"
        description: "明确低估 + 基本面健康 + 风险可控 + 各章结论一致 → 买入区间"
      - range: "50-74"
        description: "有吸引力但存在明确疑虑（周期不确定、管理层存疑、章节间有矛盾、前瞻风险偏高）→ 观望"
      - range: "30-49"
        description: "风险收益不对称，下行风险大于上行空间 → 偏向回避"
      - range: "0-29"
        description: "重大风险、价值陷阱、数据不可信、或一票否决 → 明确回避"

    # 决策边界（回测优化：75分阈值 Sharpe 0.62 vs 70分 0.36）
    decision_thresholds:
      buy: 75                              # ≥ 75 → 买入
      watch: [30, 74]                      # 30-74 → 观望
      avoid: 29                            # ≤ 29 → 回避

  # ---- Agent 输出字段 ----
  synthesis_fields:
  - '流派判定: 纯硬收息 / 价值发现 / 质量成长(GARP) / 烟蒂股 / 关联方资源'
  - '筛选评级: S级 / A级 / B级 / 未达标'
  - '核心估值指标: EV/FCF倍数、安全边际'
  - '苹果买卖模型: 正常价 / 买入价 / 卖出价'
  - '一句话买入逻辑（强制）: 可证伪的投资命题'
  - '关键风险: Top 3-5 风险点'
  - '前瞻风险评估: 政策风险/AI冲击/行业趋势的核心判断'
  - '一致性检查: 通过 / 存在矛盾（列出）'
  - '管理人诚信评估: 可信 / 存疑 / 不可信'
  - '最终建议: 买入 / 观望 / 回避'
  - '综合评分: 0-100分'
  - '信心水平: 高 / 中 / 低'

# ============================================================
# 回测配置
# ============================================================
backtest:
  start_date: '2020-06-30'
  end_date: '2025-12-31'
  cross_section_interval: 6m
  top_n: 50
  agent_concurrency: 10
  forward_periods:
  - {months: 1, label: 1个月}
  - {months: 3, label: 3个月}
  - {months: 6, label: 6个月}
  - {months: 12, label: 12个月}

# ============================================================
# LLM 配置
# ============================================================
llm:
  base_url_env: LLM_BASE_URL
  api_key_env: LLM_API_KEY
  base_url: https://api.deepseek.com
  model: deepseek-chat
  max_tokens: 8192
  temperature: 0.1
