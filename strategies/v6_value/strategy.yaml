# ============================================================
# V6 价值投资分析策略
# ============================================================
#
# 核心理念: 用量化筛选低估值高股息标的，再用 AI Agent 做深度定性分析，
#           通过多截面回测验证策略有效性。
#
# 工作流:
#   1. screening  → 量化过滤 + 评分分级 (金龟/银龟/铜龟)
#   2. framework  → Agent 六章分析 (数据核查→基本面→现金流→估值→压力测试→决策)
#   3. synthesis  → 结构化综合研判 (思考步骤→评分锚点→决策边界)
#   4. backtest   → 多截面回测 + 多基准绩效评估
#
# 命令:
#   python -m src.engine.launcher strategies/v6_value/strategy.yaml screen 2024-06-30
#   python -m src.engine.launcher strategies/v6_value/strategy.yaml backtest-screen
#   python -m src.engine.launcher strategies/v6_value/strategy.yaml backtest-agent
#   python -m src.engine.launcher strategies/v6_value/strategy.yaml backtest-eval
# ============================================================

meta:
  name: V6 价值投资分析
  version: "6.0"

# ============================================================
# 量化筛选配置
# ============================================================
# 流程: 全市场 → 排除ST/退市 → 过滤条件 → 评分排序 → 分级 → 行业上限 → Top N
#
# 设计思路:
#   - filters 是硬门槛，不满足直接淘汰
#   - scoring.factors 是软评分，满足越多分越高
#   - tiers 是分级标签，基于独立的硬性条件判定（与评分独立）
#   - industry_cap 防止单一行业扎堆
#   - agent_batch 控制进入 Agent 深度分析的数量

screening:
  # ---- 排除规则 ----
  exclude:
  - field: name
    contains: [ST, 退]                  # ST股和退市整理期股票直接排除

  # ---- 行业分散 ----
  industry_cap: 3                        # 单行业最多入选 N 只，按 tier_score 取 top

  # ---- Agent 批量分析 ----
  agent_batch:
    ratio: 0.2                           # 取筛选结果的前 20%
    max: 20                              # 单截面最多分析 20 只

  # ---- 硬性过滤条件 ----
  # 全部必须同时满足，不满足任一条件的股票被淘汰
  filters:
  - field: pe_ttm                        # 市盈率 TTM
    min: 0.01                            # > 0 排除亏损股
    max: 15.0                            # ≤ 15 只看低估值
  - field: pb                            # 市净率
    min: 0.01                            # > 0 排除负净资产
  - field: total_mv                      # 总市值（万元）
    min: 1000000.0                       # ≥ 100亿，排除小盘股
  - field: dv                            # 股息率 (%)
    min: 0.01                            # > 0 必须有分红

  # ---- 评分因子 ----
  # 通过过滤后的股票按这些因子加权打分 (0-100)
  # full = 满分值 (该因子得 100 分), zero = 零分值 (该因子得 0 分), 线性插值
  scoring:
    factors:
    - field: pe_ttm                      # PE 越低越好
      weight: 0.3
      lower_better: true
      full: 6.0                          # PE ≤ 6 得满分
      zero: 15.0                         # PE ≥ 15 得零分
    - field: pb                          # PB 越低越好
      weight: 0.3
      lower_better: true
      full: 0.5                          # PB ≤ 0.5 得满分 (深度破净)
      zero: 1.5                          # PB ≥ 1.5 得零分
    - field: dv                          # 股息率越高越好
      weight: 0.4                        # 最高权重，收息为核心
      lower_better: false
      full: 8.0                          # 股息率 ≥ 8% 得满分
      zero: 2.0                          # 股息率 ≤ 2% 得零分

    # ---- 分级条件 (独立于评分) ----
    # 必须同时满足该级别所有条件才能获得评级
    # 评级按顺序匹配，命中第一个即停止
    tiers:
    - name: 金龟                          # 极度低估 + 高息
      conditions:
      - {field: pe_ttm, max: 8.0}       # PE ≤ 8
      - {field: pb, max: 0.8}           # PB ≤ 0.8 (破净)
      - {field: dv, min: 7.0}           # 股息率 ≥ 7%
    - name: 银龟                          # 明确低估 + 中高息
      conditions:
      - {field: pe_ttm, max: 10.0}
      - {field: pb, max: 1.0}
      - {field: dv, min: 5.0}
    - name: 铜龟                          # 偏低估 + 有息
      conditions:
      - {field: pe_ttm, max: 12.0}
      - {field: pb, max: 1.2}
      - {field: dv, min: 4.0}
    default_tier: 不达标                   # 不满足任何分级条件

# ============================================================
# Agent 分析框架
# ============================================================
# 六章分析，每章由多个算子组成，章节间有依赖关系 (DAG)
# 算子定义在 operators/ 目录下的 .md 文件中
#
# 信息流:
#   Ch01 数据可信吗？ → Ch02 这是什么公司？ → Ch03 利润是真金白银吗？
#   → Ch04 当前价格低估吗？ → Ch05 最坏情况如何？ → Ch06 怎么买卖？
#
# 设计原则:
#   - 先验证质量，再评估价格，最后做决策
#   - 后面的章节能看到前面的结论 (避免孤立分析)
#   - 所有分析严格遵守 cutoff_date 时间边界

framework:
  operators_dir: operators/v1     # 锁定 v1 算子库（与回测结果 +7.1pp alpha 绑定）
  analyst_role: 严谨的价值投资分析师

  chapters:
  # ---- 第一章: 数据可信度 ----
  # 如果数据不可信，后续分析无意义
  - id: ch01_screening
    chapter: 1
    title: 数据核查与快速筛选
    operators: [data_source_grading, geopolitical_exclusion, quick_screen_5min]
    dependencies: []

  # ---- 第二章: 公司画像 ----
  # 判断公司类型，决定后续用什么方法分析
  - id: ch02_fundamental
    chapter: 2
    title: 基本面分析
    operators: [soe_identification, stream_classification, debt_structure, cycle_analysis, management_integrity]
    dependencies: [ch01_screening]

  # ---- 第三章: 盈利质量 ----
  # 利润是"真金白银"还是"纸面富贵"？
  - id: ch03_cashflow
    chapter: 3
    title: 现金流与盈利质量
    operators: [cash_trend_5y, performance_restoration, owner_earnings]
    dependencies: [ch01_screening, ch02_fundamental]

  # ---- 第四章: 估值判断 ----
  # 基于真实盈利能力，当前价格是否低估？
  - id: ch04_valuation
    chapter: 4
    title: 估值与安全边际
    operators: [pe_trap_detection, valuation_fcf, valuation_dividend, safety_margin]
    dependencies: [ch02_fundamental, ch03_cashflow]

  # ---- 第五章: 极端情况 ----
  # 最坏情况下会怎样？有没有特殊投资逻辑？
  - id: ch05_stress
    chapter: 5
    title: 压力测试与特殊分析
    operators: [stress_test, cigar_butt, light_asset_model]
    dependencies: [ch03_cashflow, ch04_valuation]

  # ---- 第六章: 交易决策 ----
  # 具体在什么价格买入/卖出？仓位多大？
  - id: ch06_decision
    chapter: 6
    title: 投资决策与持仓管理
    operators: [apple_trading_model, valuation_repair, position_management]
    dependencies: [ch04_valuation, ch05_stress]

  # ---- 综合研判 ----
  # 六章分析完成后，结构化思考 → 评分 → 决策
  # 设计哲学: 算子管"看什么"，思考步骤管"怎么想"，评分留给 LLM 判断力
  # 详见 docs/design/scoring.md
  synthesis:
    # 四步结构化思考 — 引导推理路径，不限定结论
    thinking_steps:
      - step: 一票否决
        instruction: |
          检查是否触发以下任一条件（触发则直接回避，评分 ≤ 25）：
          - 数据不可信（Ch01 未通过初筛，数据源评级为 D/E）
          - 管理层诚信评估为"不可信"（财务造假嫌疑、频繁违规）
          - 有息负债结构为"危险"且经营现金流无法覆盖利息
          - 审计意见非标准无保留（保留意见、否定意见、无法表示意见）
          如果触发否决，简要说明原因后直接给出回避建议，无需后续步骤。
      - step: 识别投资机会类型
        instruction: |
          基于 Ch02 流派判定，确认这属于哪种投资机会，并明确后续评估侧重：
          - 纯硬收息：核心看股息可持续性（派息率 < 70%、现金流覆盖）、分红历史稳定性
          - 价值发现：核心看安全边际（当前价 vs 内在价值）、估值修复催化剂是否存在
          - 烟蒂股：核心看清算价值（净流动资产 vs 市值）、资产变现可能性
          - 关联方资源：核心看政策依赖度、资源获取的可持续性
          不同流派的评分侧重不同——不要用纯硬收息的标准去评价值发现型标的。
      - step: 核心矛盾
        instruction: |
          回答两个关键问题（各用 1-2 句话）：
          1. 最可能让我亏钱的原因是什么？（综合 Ch05 压力测试 + Ch02 风险因素）
          2. 如果买入，我赚的是什么钱？（估值修复 / 股息收入 / 业绩拐点）
          如果问题 1 的答案比问题 2 更有说服力，应倾向回避或低分观望。
      - step: 评分与决策
        instruction: |
          信号分层权重：核心信号（基本面、现金流、估值）决定买卖；筛选规则仅作参考提示，不构成否决。
          基于以上三步分析，参照评分锚点给出综合评分，并确保评分与最终建议一致。
          评分时特别注意：不要被单一亮点拉高分数，也不要被单一瑕疵拉低——综合权衡。

    # 评分锚点 — 校准参考，不是公式
    # 告诉 LLM "90分的标的长什么样"，让不同分析之间的分数可比
    scoring_rubric:
      - range: "85-100"
        description: "极度低估 + 现金流强劲 + 管理层可信 + 无重大风险 + 明确催化剂"
      - range: "70-84"
        description: "明确低估 + 基本面健康 + 风险可控 → 买入区间"
      - range: "50-69"
        description: "有一定吸引力但存在明确疑虑（周期位置不确定、管理层存疑、行业逆风）→ 观望"
      - range: "30-49"
        description: "风险收益不对称，下行风险大于上行空间 → 偏向回避"
      - range: "0-29"
        description: "重大风险、价值陷阱、数据不可信、或一票否决 → 明确回避"

    # 决策边界 — 强制评分与建议一致，不能出现"评分75但建议观望"
    decision_thresholds:
      buy: 70                            # ≥ 70 → 买入
      watch: [30, 69]                    # 30-69 → 观望
      avoid: 29                          # ≤ 29 → 回避

  # ---- Agent 输出字段 ----
  # 综合研判必须输出以下字段 (JSON 格式)
  synthesis_fields:
  - '流派判定: 纯硬收息 / 价值发现 / 烟蒂股 / 关联方资源'
  - '龟级评定: 金龟 / 银龟 / 铜龟 / 不达标'
  - '核心估值指标: EV/FCF倍数、安全边际'
  - '苹果买卖模型: 正常价 / 买入价 / 卖出价'
  - '一句话买入逻辑（强制）: 可证伪的投资命题'
  - '关键风险: Top 3-5 风险点'
  - '管理人诚信评估: 可信 / 存疑 / 不可信'
  - '最终建议: 买入 / 观望 / 回避'
  - '综合评分: 0-100分'
  - '信心水平: 高 / 中 / 低'

# ============================================================
# 回测配置
# ============================================================
# 三步独立 Pipeline:
#   backtest-screen → 生成截面日期 + 逐截面筛选 + 保存 CSV
#   backtest-agent  → 并发 Agent 分析 (增量/重试/进度)
#   backtest-eval   → 采集前向收益 + 四基准绩效评估
#
# 五个对比基准:
#   market      — 沪深300指数 (全市场基准)
#   screen_all  — 全部筛选候选等权
#   screen_top  — 最高评级 (金龟) 等权
#   agent_buy   — Agent 建议买入 (≥70分) 等权
#   agent_top   — Agent 评分 Top5 等权
#
# start_date 决定截面对齐模式:
#   起始 06-30 → 生成 06-30, 12-31, 06-30, ... (半年报/年报期末)
#   起始 03-31 → 生成 03-31, 09-30, 03-31, ... (一季报/三季报期末)

backtest:
  start_date: '2020-06-30'              # 回测起始截面
  end_date: '2025-12-31'                # 回测结束截面
  cross_section_interval: 6m            # 截面间隔 (支持: 1m, 3m, 6m, 1y, 2w)
  top_n: 50                             # 每截面筛选候选数
  agent_concurrency: 10                  # Agent 并发数 (DeepSeek 不限并发)
  forward_periods:                      # 前向收益评估窗口
  - {months: 1, label: 1个月}
  - {months: 3, label: 3个月}
  - {months: 6, label: 6个月}           # 主评估周期
  - {months: 12, label: 12个月}

# ============================================================
# LLM 配置
# ============================================================
# Agent 分析使用的大语言模型
# 优先从环境变量读取 (适合 CI/多人协作)，fallback 到下面的硬编码值
# 环境变量: LLM_BASE_URL, LLM_API_KEY

llm:
  base_url_env: LLM_BASE_URL            # 环境变量名 (优先)
  api_key_env: LLM_API_KEY              # 环境变量名 (优先)
  base_url: https://api.openai.com/v1   # fallback base URL
  model: gpt-4o                         # 推荐: gpt-4o, deepseek-chat
  max_tokens: 8192                      # 单次回复最大 token
  temperature: 0.1                      # 低温度 = 更确定性的分析
